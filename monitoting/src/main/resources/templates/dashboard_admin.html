<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(
        ~{::main},
        'Dashboard - Green Portal',
        'dashboard',
        'Dashboard',
        'Weekly overview'
      )}">

<main class="page-shell">

    <style>
        .kpi{
            padding: 16px 16px;
            min-height: 110px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:14px;
        }
        .kpi .label{ font-size:.86rem; color:#6b7280; margin-bottom:6px; }
        .kpi .value{ font-size:1.35rem; font-weight:800; line-height:1; letter-spacing:.2px; }
        .kpi .unit{ font-size:.86rem; color:#6b7280; font-weight:700; margin-left:6px; }
        .kpi .icon{
            width: 46px; height: 46px;
            display:flex; align-items:center; justify-content:center;
            border-radius: 16px;
            background: rgba(25,135,84,.12);
            color:#146c43;
            font-size: 1.3rem;
            flex-shrink:0;
        }

        .section-head{
            display:flex;
            align-items:flex-end;
            justify-content:space-between;
            gap:12px;
            margin-bottom: 10px;
        }
        .section-title{
            font-weight: 800;
            font-size: 1.05rem;
            margin:0;
        }
        .section-sub{
            color:#6b7280;
            font-size:.88rem;
            margin-top:4px;
        }

        .chart-card{ padding: 16px; }
        .chart-wrap{ height: 380px; margin-top: 10px; }

        .alert-box, .insights-box {
    padding: 8px 15px;
    margin-bottom: 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
}

.alert-box {
    background: #fff3f3;
    border-left: 4px solid red;
    font-weight: bold;
}

.insights-box {
    background: #f0f8ff;
    border-left: 4px solid #28a745;
    font-weight: 500;
}

.alert-box h3, .insights-box h3 {
    margin: 0;
    font-size: 0.95rem;
    white-space: nowrap;
}

.alert-box p, .insights-box p {
    margin: 0;
}
    </style>

    <div class="alert-box">
        <h3>Alerts:</h3>
        <p th:text="${alerts}"></p>
    </div>

    <div class="insights-box">
        <h3>Smart Insights:</h3>
        <p th:text="${insights}"></p>
    </div>

    <!-- KPI row -->
    <div class="row g-3 mb-3">
        <div class="col-xl-3 col-md-6">
            <div class="gp-card kpi">
                <div>
                    <div class="label">Water (This Week)</div>
                    <div class="value">
                        <span th:text="${waterWeek != null} ? ${#numbers.formatDecimal(waterWeek, 1, 2)} : '0.00'">0.00</span>
                        <span class="unit">L</span>
                    </div>
                </div>
                <div class="icon"><i class="bi bi-droplet"></i></div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="gp-card kpi">
                <div>
                    <div class="label">Electricity (This Week)</div>
                    <div class="value">
                        <span th:text="${electricityWeek != null} ? ${#numbers.formatDecimal(electricityWeek, 1, 2)} : '0.00'">0.00</span>
                        <span class="unit">kWh</span>
                    </div>
                </div>
                <div class="icon"><i class="bi bi-lightning-charge"></i></div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="gp-card kpi">
                <div>
                    <div class="label">Waste (This Week)</div>
                    <div class="value">
                        <span th:text="${wasteWeek != null} ? ${#numbers.formatDecimal(wasteWeek, 1, 2)} : '0.00'">0.00</span>
                        <span class="unit">Kg</span>
                    </div>
                </div>
                <div class="icon"><i class="bi bi-recycle"></i></div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="gp-card kpi">
                <div>
                    <div class="label">Trees (All Time)</div>
                    <div class="value">
                        <span th:text="${totalTrees == null ? 0 : T(java.lang.Math).round(totalTrees)}">0</span>
                        <span class="unit">trees</span>
                    </div>
                </div>
                <div class="icon"><i class="bi bi-tree"></i></div>
            </div>
        </div>
    </div>

    <!-- Big chart card -->
    <div class="gp-card chart-card">
        <div class="section-head">
            <div>
                <p class="section-title">Weekly Totals by Location</p>
                <div class="section-sub">
                    Week: <span th:text="${weekStart}">-</span> → <span th:text="${weekEnd}">-</span>
                </div>
            </div>

            <form id="filterForm" method="get" th:action="@{/dashboard}" style="display: flex; gap: 8px; align-items: center;">

                <input type="week"
                       name="selectedWeek"
                       id="weekPicker"
                       th:value="${selectedWeek}"
                       class="form-control form-control-sm"
                       onchange="this.form.submit()"
                       style="max-width: 170px; height: 31px; font-size: 0.85rem;">

                <select id="metricSelect" name="metric" class="form-select form-select-sm"
                        style="max-width: 160px;" onchange="this.form.submit()">
                    <option value="water" th:selected="${currentMetric == 'water'}">Water (L)</option>
                    <option value="electricity" th:selected="${currentMetric == 'electricity'}">Electricity (kWh)</option>
                    <option value="waste" th:selected="${currentMetric == 'waste'}">Waste (kg)</option>
                    <option value="trees" th:selected="${currentMetric == 'trees'}">Trees (count)</option>
                </select>
            </form>
        </div>

        <div class="chart-wrap">
            <canvas id="locChart"></canvas>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Inject arrays from Spring -->
    <script th:inline="javascript">
        const labels = /*[[${locationLabels ?: {}}]]*/ [];
        const water = /*[[${waterByLocation ?: {}}]]*/ [];
        const electricity = /*[[${electricityByLocation ?: {}}]]*/ [];
        const waste = /*[[${wasteByLocation ?: {}}]]*/ [];
        const trees = /*[[${treesByLocation ?: {}}]]*/ [];
        const currentMetric = /*[[${currentMetric ?: 'water'}]]*/ 'water';
    </script>

    <script>
        const ctx = document.getElementById('locChart');

        const datasetsMap = {
            water: { label: 'Water (L)', data: water, color: '#0dcaf0' },
            electricity: { label: 'Electricity (kWh)', data: electricity, color: '#ffc107' },
            waste: { label: 'Waste (kg)', data: waste, color: '#198754' },
            trees: { label: 'Trees (count)', data: trees, color: '#20c997' }
        };

        // Determine which data to show initially based on the dropdown
        const activeData = datasetsMap[currentMetric] || datasetsMap.water;

        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: activeData.label,
                    data: activeData.data,
                    backgroundColor: activeData.color,
                    borderWidth: 1,
                    borderRadius: 12
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: true } },
                scales: { y: { beginAtZero: true } }
            }
        });
    </script>

</main>
</html>
